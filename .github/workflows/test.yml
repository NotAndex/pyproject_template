name: Test with Cache

on:
  workflow_dispatch:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Cache python packages
        uses: actions/cache@v3
        with:
          path: ${{ env.Python3_ROOT_DIR }}/lib/python3.8/site-packages
          key: linting-packages-${{ hashFiles('**/pyproject.toml') }}-3.8
      - name: Install dependencies
        run: pip install -e '.[linting,testing]' --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Test with pytest
        run: pytest

  testcpuimagenet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Cache python packages
        uses: actions/cache@v3
        with:
          path: ${{ env.Python3_ROOT_DIR }}/lib/python3.8/site-packages
          key: testing-packages-${{ hashFiles('**/pyproject.toml') }}-3.8
      - name: Install dependencies
        run: pip install -e '.[testing]' --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Test with pytest
        run: pytest

  testmetalwebgpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Cache python packages
        uses: actions/cache@v3
        with:
          path: ${{ env.Python3_ROOT_DIR }}/lib/python3.11/site-packages
          key: metal-webgpu-testing-packages-${{ hashFiles('**/pyproject.toml') }}-3.11
      - name: Install dependencies
        run: pip install -e '.[metal,webgpu,testing]' --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Test with pytest
        run: python -m pytest
