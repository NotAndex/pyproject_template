[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pyproject_template"
version = "0.0.1"
authors = [{ name = "Andreas Schreiber", email = "andi@example.com" }]
description = "Just a template"
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.8"
classifiers = ["Programming Language :: Python :: 3"]
dependencies = [
    "numpy",
    "requests",
    "tqdm",
    "networkx",
    "pyopencl",
    "pyobjc-framework-Metal; platform_system=='Darwin'",
    "pyobjc-framework-Cocoa; platform_system=='Darwin'",
    "pyobjc-framework-libdispatch; platform_system=='Darwin'",
]

[project.optional-dependencies]
triton = ["triton-nightly>=2.1.0.dev20231014192330", "pycuda"]
llvm = ["llvmlite"]
cuda = ["pycuda"]
arm = ["unicorn"]
webgpu = ["wgpu"]
linting = [
    "flake8",
    "pylint",
    "mypy",
    "typing-extensions",
    "pre-commit",
    "ruff",
    "types-tqdm",
]
testing = [
    "torch",
    "pillow",
    "pytest",
    "pytest-xdist",
    "onnx==1.15.0",
    "onnx2torch",
    "opencv-python",
    "tabulate",
    "safetensors",
    "cloudpickle",
    "transformers",
    "sentencepiece",
    "tiktoken",
    "librosa",
]

[tool.setuptools]
package-dir = { "" = "src" }

[project.scripts]
entrypoint = "main:main"

[tool.pytest.ini_options]
testpaths = ["tests/unit_tests"]
